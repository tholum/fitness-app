<?xml version="1.0" encoding="UTF-8"?>
<!--
  BASECAMP app icon master.
  SUMMIT palette: bg #1c1a17, blaze->gold gradient (135deg, #c8622d -> #d9a441).
  A two-peak summit ridge glyph reads well at small sizes.
  Art is kept within the inner ~80% safe zone so the same master also
  works as the maskable icon (see maskable-512.png recipe in README.md).
  Edit this file and re-run the export commands in README.md to regenerate
  the PNGs referenced by /manifest.webmanifest.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="BASECAMP">
  <defs>
    <linearGradient id="blaze" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c8622d"/>
      <stop offset="1" stop-color="#d9a441"/>
    </linearGradient>
  </defs>

  <!-- background matches theme_color / background_color -->
  <rect width="512" height="512" fill="#1c1a17"/>

  <!-- summit ridge mark, centred inside the 80% safe zone (~51px margin) -->
  <g>
    <!-- main two-peak ridge -->
    <path
      d="M86 372 L210 196 L268 268 L330 168 L426 372 Z"
      fill="url(#blaze)"
      stroke-linejoin="round"/>
    <!-- snow caps on the two summits -->
    <path
      d="M210 196 L240 240 L210 226 L182 244 Z"
      fill="#1c1a17"
      opacity="0.92"/>
    <path
      d="M330 168 L360 232 L330 216 L302 234 Z"
      fill="#1c1a17"
      opacity="0.92"/>
  </g>
</svg>
